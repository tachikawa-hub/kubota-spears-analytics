<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
:root{--ks:#E87722;--ksd:#C05E0E;--ksl:#FEF0E3;--sn:#0B1D3A;--snm:#1A3460;--snl:#D0D8E8;--neu:#fafaf8;--ink:#1a1a1a;--mu:#6b6b6b;--ru:#e0dcd4;--gd:#1a7a3c;--wn:#b85c00;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0ece4;color:var(--ink);padding:6px;font-size:12px}
.nav{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.nav button{padding:4px 10px;border:none;border-radius:3px;background:#ddd;cursor:pointer;font-size:10px;font-weight:700;color:#444}
.nav button.active{background:var(--ks);color:white}
/* A4 landscape page: 297mm x 210mm @ 96dpi ≈ 1122 x 794px */
.page{width:1122px;height:794px;margin:0 auto;background:var(--neu);border-radius:4px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.12);display:flex;flex-direction:column}
.page>.ph{flex:0 0 auto}
.page>.ph+*{flex:1 1 auto;overflow:hidden;min-height:0}
.ph{background:var(--ks);color:white;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--ksd)}
.ph h1{font-size:12px;font-weight:700;letter-spacing:.04em}
.ph .sub{font-size:9px;color:rgba(255,255,255,.8);letter-spacing:.08em;text-transform:uppercase}
.ph .meta{font-size:9px;color:rgba(255,255,255,.75);text-align:right}
.score-pill{background:var(--sn);padding:3px 12px;border-radius:20px;font-size:14px;font-weight:900;border:1px solid rgba(255,255,255,.2)}
.cg{color:var(--gd);font-weight:700}.cw{color:var(--wn);font-weight:700}

/* ── TEAM SHEET v2 ── */
.ts2-wrap{padding:10px 14px;display:flex;gap:10px;height:100%}
.ts2-block{display:flex;flex-direction:column;border:1px solid var(--ru);border-radius:4px;overflow:hidden;background:#fff;min-height:0}
.ts2-reserves{flex:0 0 168px}
.ts2-main{flex:1;display:flex;gap:10px;min-width:0}
.ts2-main .ts2-block{flex:1}
.ts2-head{padding:6px 10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:white;display:flex;justify-content:space-between;align-items:baseline;flex:0 0 auto}
.ts2-head .nm{font-size:11px}
.ts2-head .tag{font-size:8px;font-weight:700;opacity:.85;letter-spacing:.08em}
.ts2-head.h{background:var(--ks)}.ts2-head.a{background:var(--snm)}
.ts2-body{flex:1 1 auto;display:flex;flex-direction:column;min-height:0}
.ts2-row{flex:1;display:flex;align-items:center;gap:8px;padding:0 10px;border-bottom:1px solid var(--ru);min-height:0}
.ts2-row:last-child{border-bottom:none}
.ts2-row.sub{background:#f8f6f2}
.ts2-shirt{font-weight:800;font-size:13px;color:var(--ksd);width:20px;text-align:center;flex:0 0 auto}
.ts2-shirt.a{color:var(--snm)}
.ts2-info{flex:1;min-width:0}
.ts2-name{font-weight:700;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ts2-pos{font-size:8px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ts2-mins{font-weight:800;font-size:12px;flex:0 0 auto;text-align:right;min-width:30px}
.ts2-reserves .ts2-name{font-size:10px;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.2}
.ts2-reserves .ts2-shirt{font-size:11px}
.ts2-reserves .ts2-mins{font-size:11px}
.ts2-toprow-spacer{flex:0 0 37.5%}
.ts2-reserves .ts2-body{flex:0 0 44%}

/* ── MATCH SUMMARY (dashboard) ── */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:auto auto 1fr;gap:6px;padding:6px 10px;height:100%}
.sum-card{background:#fff;border:1px solid var(--ru);border-radius:6px;padding:7px 10px;display:flex;flex-direction:column;gap:4px;min-width:0;min-height:0;overflow:hidden}
.sum-card.wide{grid-column:1/-1}
.sum-card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#222;border-bottom:1px solid var(--ru);padding-bottom:5px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:baseline}
/* score highlight */
.score-board{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.score-team{text-align:center}
.score-team-name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.score-team.h .score-team-name{color:var(--ksd)}
.score-team.a .score-team-name{color:var(--snm)}
.score-team-pts{font-size:44px;font-weight:900;line-height:1.05}
.score-team.h .score-team-pts{color:var(--ks)}
.score-team.a .score-team-pts{color:var(--snm)}
.score-ht{font-size:9px;color:var(--mu);font-weight:600}
.score-mid{text-align:center;padding:0 8px;display:flex;flex-direction:column;gap:2px}
.score-mid .vs{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:.1em}
.score-mid .comp{font-size:8.5px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em}
.score-mid .venue{font-size:8.5px;color:var(--mu)}
.score-bip{margin-top:8px;padding-top:8px;border-top:1px solid var(--ru);display:flex;justify-content:center;gap:18px;font-size:9px;color:var(--mu)}
.score-bip b{font-size:13px;color:var(--ink);display:block;font-weight:900}
/* donut */
.donut-row{display:flex;align-items:center;gap:12px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:8px;font-size:9px;min-width:0}
.donut-legend-row{display:flex;flex-direction:column;gap:1px}
.donut-legend-row .dn{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.donut-legend-row.h .dn{color:var(--ksd)}
.donut-legend-row.a .dn{color:var(--snm)}
.donut-legend-row .dv{font-weight:800;font-size:13px}
/* gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.gauge-val{font-size:16px;font-weight:900;color:var(--ink);margin-top:-24px}
.gauge-cap{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em}
.gauge-split{width:100%;margin-top:3px}
/* stat rows (bar comparisons inside cards) */
.stat-row{margin-bottom:7px}
.stat-row:last-child{margin-bottom:0}
.stat-row-top{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:2px}
.stat-row-top .sv{font-size:12px;font-weight:800;min-width:30px}
.stat-row-top .sv.h{color:var(--ksd);text-align:left}
.stat-row-top .sv.a{color:var(--snm);text-align:right}
.qtot-cols .stat-row-top .sv.h{background:var(--ksl);border-radius:3px;padding:1px 5px}
.qtot-cols .stat-row-top .sv.a{background:var(--snl);border-radius:3px;padding:1px 5px}
.stat-row-top .sl{font-size:10px;color:#333;font-weight:800;text-transform:uppercase;letter-spacing:.03em;text-align:center;flex:1}
.stat-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;display:flex}
.stat-bar-h{background:var(--ks)}
.stat-bar-a{background:var(--snm)}

/* ── QUARTERS (dashboard) ── */
.page>.qtot-wrap{flex:0 0 auto;overflow:visible}
.qtot-wrap{padding:12px 16px 8px}
/* team identification band (top of Quarters table) */
.qtr-teamband{display:grid;grid-template-columns:1fr 1fr;border-radius:6px;overflow:hidden;margin-bottom:6px}
.qtr-teamband .qtb{padding:6px 14px;color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.qtr-teamband .qtb.h{background:var(--ks);text-align:left}
.qtr-teamband .qtb.a{background:var(--snm);text-align:right}
.qtot-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
.qtot-cols .stat-row{margin-bottom:6px}
.qtot-cols .stat-row-top .sv{font-size:14px;min-width:30px;font-weight:800}
.qtot-cols .stat-row-top .sl{font-size:10px;font-weight:700}
.qtot-cols .stat-bar{height:5px}
.qtr-grid{display:grid;grid-template-columns:1fr 1fr 1.4fr 1fr 1fr;gap:8px;padding:8px 10px;flex:1 1 auto;min-height:0;align-items:stretch}
.qtr-card{background:#fff;border:1px solid var(--ru);border-radius:6px;overflow:hidden;display:flex;flex-direction:column}
.qtr-head{padding:6px 10px;color:white;display:flex;justify-content:space-between;align-items:baseline;flex:0 0 auto}
.qtr-head .qh-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.qtr-head .qh-range{font-size:8px;font-weight:600;opacity:.85}
.qtr-body{padding:4px 10px;flex:1 1 auto;display:flex;flex-direction:column;justify-content:center}
.qtr-row{display:flex;justify-content:space-between;align-items:stretch;padding:5px 0;border-bottom:1px solid #f3f0eb;gap:4px}
.qtr-row:last-child{border-bottom:none}
.qtr-row .ql-lbl{color:var(--mu);font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;flex:1;text-align:center;display:flex;align-items:center;justify-content:center}
.qtr-row .ql-v{font-weight:800;font-size:12px;min-width:38px;display:flex;align-items:center;border-radius:3px}
.qtr-row .ql-v.h{text-align:right;justify-content:flex-end;color:var(--ksd);padding:1px 6px 1px 4px}
.qtr-row .ql-v.a{text-align:left;justify-content:flex-start;color:var(--snm);padding:1px 4px 1px 6px}
.qtr-row .ql-v.cg{color:var(--gd)}
.qtr-row .ql-v.cw{color:var(--wn)}
.qtr-foot{flex:0 0 auto;display:flex;gap:14px;margin:4px 12px 6px;font-size:8px;color:var(--mu);flex-wrap:wrap;align-items:center}

/* ── MOMENTUM ── */
.tlwrap{padding:10px 24px;display:flex;flex-direction:column;gap:18px;justify-content:center;height:100%}
.tlt{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:4px}
.tlleg{display:flex;gap:10px;margin-bottom:4px}
.tlleg span{font-size:8px;color:var(--mu);display:flex;align-items:center;gap:3px}
.tlleg .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.tlch{position:relative;height:36px;margin-bottom:3px}
.tlax{position:absolute;bottom:50%;left:0;right:0;height:2px;background:#ccc;transform:translateY(50%)}
.tldot{position:absolute;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);top:50%}
.tldot.h{background:var(--ks)}.tldot.a{background:var(--sn);border:1px solid #888}
.tlml{position:absolute;font-size:7px;font-weight:700;transform:translateX(-50%);white-space:nowrap}
.tlml.h{top:22px;color:var(--ksd)}.tlml.a{bottom:22px;color:var(--snm)}
.htl{position:absolute;top:0;bottom:0;width:1px;border-left:1px dashed #bbb}
.htlb{position:absolute;font-size:7px;color:#bbb;top:2px;transform:translateX(-50%)}
.tlaxis-labels{display:flex;justify-content:space-between;font-size:7px;color:var(--mu);margin-top:2px}
.tlla{display:flex;justify-content:space-between;font-size:7px;color:var(--mu);margin-top:2px}

/* ── 22M ── */
.e22wrap{padding:10px 16px;display:grid;grid-template-columns:220px 1fr 220px;gap:16px;height:100%;align-items:center}
.e22t{min-width:0;display:flex;flex-direction:column}
.e22h{padding:6px 8px;font-size:11px;font-weight:800;text-transform:uppercase;color:white;text-align:center;border-radius:3px 3px 0 0;flex:0 0 auto}
.e22h.home{background:var(--ks)}.e22h.away{background:var(--snm)}
.e22c{border:1px solid var(--ru);border-top:none;border-radius:0 0 3px 3px;flex:1 1 auto;display:flex;flex-direction:column;min-height:0}
.e22-total{text-align:center;padding:12px 6px;background:#f8f6f2;border-bottom:1px solid var(--ru)}
.e22-total .n{font-size:40px;font-weight:900;line-height:1}
.e22-total .s{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-top:4px}
.e22st{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--ru);font-size:14px;font-weight:600}
.e22st .l{color:var(--mu);font-size:10px}
.gauge-wrap{padding:8px 6px 4px;text-align:center;border-top:1px solid var(--ru);flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0}
.gauge-wrap svg{width:165px;height:120px}
.gauge-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:4px}
.gauge-target{font-size:9px;color:var(--mu);margin-top:2px}
.e22mid{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}

/* ── SET PIECE v2 ── */
.sp2-wrap{padding:8px 12px;display:grid;grid-template-columns:1fr 1.6fr 1fr;grid-template-rows:auto auto;gap:8px}
.sp2-col{display:flex;flex-direction:column;gap:8px;min-width:0;min-height:0}
.sp2-mid{display:flex;flex-direction:column;gap:8px;min-width:0;min-height:0}
.sp2-card{border:1px solid var(--ru);border-radius:4px;overflow:visible;display:flex;flex-direction:column;background:#fff;flex:1 1 0;min-height:auto}
.sp2-head{padding:4px 10px;font-size:10px;font-weight:800;color:white;display:flex;justify-content:space-between;align-items:baseline;flex:0 0 auto;text-transform:uppercase;letter-spacing:.04em}
.sp2-head.h{background:var(--ks)}.sp2-head.a{background:var(--snm)}
.sp2-head.mid{background:var(--sn);justify-content:center;letter-spacing:.12em}
.sp2-body{flex:1 1 auto;padding:6px 10px;display:flex;flex-direction:column;gap:4px;min-height:0;overflow:visible}
.sp2-subtitle{font-size:6.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:0;flex:0 0 auto;font-weight:700}
.sp2-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;flex:0 0 auto}
.sp2-grid4 .c{text-align:center;background:#f5f2ed;border-radius:3px;padding:3px 0}
.sp2-grid4 .c .n{font-size:12px;font-weight:700}
.sp2-grid4 .c .l{font-size:6px;color:var(--mu);text-transform:uppercase;margin-top:1px}
.spmt{width:100%;border-collapse:collapse;font-size:9px;table-layout:fixed;flex:0 0 auto}
.spmt th{padding:2.5px 2px;background:#f0ede8;font-size:6.5px;line-height:1.25;color:var(--mu);text-transform:uppercase;letter-spacing:.01em;border-bottom:1px solid var(--ru);text-align:center;overflow-wrap:break-word}
.spmt td{padding:3.5px 2px;border-bottom:1px solid var(--ru);text-align:center;font-weight:600;font-size:9px}
.spmt td.tn{text-align:left;font-weight:700}
/* Scrum cards: fewer rows → larger visual elements, centered */
.sp2-card.sc .sp2-body{justify-content:center}
.sp2-card.sc .sp2-grid4 .c{padding:12px 0}
.sp2-card.sc .sp2-grid4 .c .n{font-size:22px}
.sp2-card.sc .sp2-grid4 .c .l{font-size:9px}
.sp2-card.sc .sp2-subtitle{font-size:9px}
.sp2-stab-row{display:flex;align-items:center;justify-content:center;gap:14px;flex:0 0 auto}
.sp2-stab-stats{display:flex;flex-direction:column;gap:6px;font-size:11px}
.sp2-stab-stats .r{display:flex;justify-content:space-between;gap:10px;min-width:110px}
.sp2-stab-stats .r .l{color:var(--mu);text-transform:uppercase;font-size:9px;font-weight:700}
.sp2-stab-stats .r .v{font-weight:800}
/* Total tries highlight card (per team) */
.sp2-trycard{flex:0 0 auto;border:1px solid var(--ru);border-radius:4px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;text-align:center}
.sp2-trycard .n{font-size:36px;font-weight:900;line-height:1;color:var(--ksd)}
.sp2-trycard.a .n{color:var(--snm)}
.sp2-trycard .l{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--mu);font-weight:700;margin-top:4px;line-height:1.3}
/* Overview (middle) cards */
.sp2-mid-donuts{display:flex;justify-content:center;gap:10px;flex:0 0 auto}
.sp2-mid-donuts .d{text-align:center}
.sp2-mid-donuts .d .lbl{font-size:13px;font-weight:800;margin-top:6px}
.sp2-mid-donuts .d.h .lbl{color:var(--ksd)}
.sp2-mid-donuts .d.a .lbl{color:var(--snm)}
.sp2-mid .sp2-body{justify-content:center;gap:18px}
.sp2-mid .spmt th{padding:6px 4px;font-size:10px}
.sp2-mid .spmt td{padding:10px 4px;font-size:13px}

/* ── PENALTY ── */
.penwrap{padding:12px 16px;display:flex;gap:16px;height:100%}
.pent{flex:1;display:flex;flex-direction:column;min-width:0}
.penth{padding:8px 14px;font-size:13px;font-weight:800;text-transform:uppercase;color:white;display:flex;justify-content:space-between;border-radius:3px 3px 0 0;flex:0 0 auto}
.penth.h{background:var(--ks)}.penth.a{background:var(--snm)}
.penb{border:1px solid var(--ru);border-top:none;border-radius:0 0 3px 3px;flex:1 1 auto;display:flex;flex-direction:column;min-height:0}
.pensc{padding:10px 16px;border-bottom:1px solid var(--ru);flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0}
.pensc:last-child{border-bottom:none}
.penstitle{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:6px}
.pbr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pbl{font-size:11px;color:var(--ink);min-width:135px}
.pbt{flex:1;height:11px;background:#eee;border-radius:4px;overflow:hidden}
.pbf{height:100%;border-radius:4px}.pbf.h{background:var(--ks)}.pbf.a{background:var(--snm)}
.pbn{font-size:13px;font-weight:700;min-width:18px;text-align:right}
.pen-bars{display:flex;align-items:flex-end;gap:18px;height:90px;padding:0 10px}
.pen-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.pen-bar-val{font-size:13px;font-weight:800;margin-bottom:3px}
.pen-bar-track{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.pen-bar{width:46%;border-radius:3px 3px 0 0;min-height:3px}
.pen-bar.h{background:var(--ks)}.pen-bar.a{background:var(--snm)}
.pen-bar-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:5px;font-weight:700}
.adbar{display:flex;height:26px;border-radius:4px;overflow:hidden;margin:6px 0 4px}
.adbar-atk{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;background:var(--ks)}
.adbar-def{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;background:var(--snm)}

/* ── INDIV ── */
.itwrap{padding:10px 16px;overflow-x:auto;height:100%;display:flex;flex-direction:column;justify-content:center}
.it{border-collapse:collapse;font-size:9.5px;white-space:nowrap;width:100%}
.it thead th{padding:5px 5px;background:var(--ks);color:white;font-size:9px;font-weight:700;text-align:center;border-right:1px solid rgba(255,255,255,.15);border-bottom:1px solid rgba(255,255,255,.2);line-height:1.3;vertical-align:bottom}
.it thead th.ga{background:var(--snm)}.it thead th.gl{background:var(--sn)}
.it thead tr.gr th{font-size:8px;padding:4px 5px;letter-spacing:.04em;border-bottom:2px solid rgba(255,255,255,.3)}
.it tbody td{padding:5px 5px;text-align:center;border-bottom:1px solid var(--ru);border-right:1px solid #eee;font-size:9.5px;line-height:1.3;height:22px;box-sizing:border-box}
.it tbody td.nc{text-align:left;font-weight:600;font-size:9.5px;min-width:115px}
.it tbody td.pc{text-align:left;color:var(--mu);font-size:8.5px;min-width:78px}
.it tbody td.shc{font-weight:700;background:#f5f2ed;color:var(--ksd)}
.it tbody tr.tr td{background:var(--ks);color:white;font-weight:700}
.it tbody tr.tr.aw td{background:var(--snm)}
.note{font-size:9px;color:var(--mu);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;padding:0 2px}
.cd{color:#ccc}
.chi{background:rgba(232,119,34,.12)!important;font-weight:700}

@page{size:A4 landscape;margin:0}
@media print{
  body{padding:0;background:white}
  .nav{display:none}
  .page{width:297mm;height:210mm;margin:0;box-shadow:none;border-radius:0}
}
</style>
</head>
<body>
<div class="nav" id="nav"></div>
<div id="content"></div>
<script>
/* ============================================================

function hdr(t){
  return`<div class="ph"><div><div class="sub">${D.info.competition} · Round ${D.info.round}</div><h1>${t}</h1><div style="font-size:9px;color:rgba(255,255,255,.7);margin-top:1px">${D.info.venue} · ${D.info.date}</div></div><div class="score-pill">${HOME} ${D.info.home_score} – ${D.info.away_score} ${AWAY}</div><div class="meta">HT: ${D.info.home_ht}–${D.info.away_ht}</div></div>`;
}

function f(v,pct){if(v===null||v===undefined)return'-';return pct?v+'%':v;}
function cls(hv,av,good){
  const h=parseFloat(hv),a=parseFloat(av);
  if(isNaN(h)||isNaN(a))return{h:'',a:''};
  if(h===a)return{h:'',a:''};
  if(good)return h>a?{h:'cg',a:'cw'}:{h:'cw',a:'cg'};
  return h<a?{h:'cg',a:'cw'}:{h:'cw',a:'cg'};
}

// comparison bar row (home vs away) — shared by dashboard-style pages
function barRow(label,hDisp,aDisp,hPct){
  const aPct=100-hPct;
  return`<div class="stat-row">
    <div class="stat-row-top"><span class="sv h">${hDisp}</span><span class="sl">${label}</span><span class="sv a">${aDisp}</span></div>
    <div class="stat-bar"><div class="stat-bar-h" style="width:${hPct}%"></div><div class="stat-bar-a" style="width:${aPct}%"></div></div>
  </div>`;
}
function statRow(label,hv,av,sfx){
  const total=(+hv)+(+av)||1;
  const hPct=Math.round(+hv/total*100);
  const sfxStr=sfx||'';
  return barRow(label,hv+sfxStr,av+sfxStr,hPct);
}

// single-value donut (0-100%, for success rates)
function donutSingle(pct,color){
  const r=36,c=2*Math.PI*r,len=c*Math.min(Math.max(pct,0),100)/100;
  return`<svg viewBox="0 0 110 110" style="width:84px;height:84px;flex-shrink:0">
    <circle cx="55" cy="55" r="${r}" fill="none" stroke="#eee" stroke-width="13"/>
    <circle cx="55" cy="55" r="${r}" fill="none" style="stroke:${color}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${len.toFixed(1)} ${c.toFixed(1)}" transform="rotate(-90 55 55)"/>
    <text x="55" y="61" text-anchor="middle" font-size="21" font-weight="900" style="fill:${color}">${pct}%</text>
  </svg>`;
}

// Half-donut "speedometer" gauge with a target-line marker (used on Set Piece overview cards)
function gaugeHalf(pct,color,target=90){
  const cx=100,cy=100,r=85,sw=20;
  const startA=Math.PI,endA=2*Math.PI;
  const valA=startA+(endA-startA)*Math.min(Math.max(pct,0),100)/100;
  const tgtA=startA+(endA-startA)*(target/100);
  const pt=(a,radius)=>({x:cx+radius*Math.cos(a),y:cy+radius*Math.sin(a)});
  const s=pt(startA,r),e=pt(valA,r),bgEnd=pt(endA,r);
  const largeArc=(valA-startA)>Math.PI?1:0;
  const t1=pt(tgtA,r-sw/2-4),t2=pt(tgtA,r+sw/2+4);
  return`<svg viewBox="0 0 210 112" style="width:240px;height:128px;flex-shrink:0">
    <path d="M ${s.x.toFixed(1)} ${s.y.toFixed(1)} A ${r} ${r} 0 1 1 ${bgEnd.x.toFixed(1)} ${bgEnd.y.toFixed(1)}" fill="none" stroke="#eee" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M ${s.x.toFixed(1)} ${s.y.toFixed(1)} A ${r} ${r} 0 ${largeArc} 1 ${e.x.toFixed(1)} ${e.y.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>
    <line x1="${t1.x.toFixed(1)}" y1="${t1.y.toFixed(1)}" x2="${t2.x.toFixed(1)}" y2="${t2.y.toFixed(1)}" stroke="#555" stroke-width="3"/>
    <text x="${t2.x.toFixed(1)}" y="${(t2.y-6).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="#555">${target}%</text>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="34" font-weight="900" fill="${color}">${pct}%</text>
  </svg>`;
}

// Two-segment donut (positive/negative split, used on Set Piece scrum "Stability" cards)
function donutDuo(posPct,posColor,negColor){
  const r=36,c=2*Math.PI*r,posLen=c*Math.min(Math.max(posPct,0),100)/100;
  return`<svg viewBox="0 0 110 110" style="width:84px;height:84px;flex-shrink:0">
    <circle cx="55" cy="55" r="${r}" fill="none" style="stroke:${negColor}" stroke-width="13"/>
    <circle cx="55" cy="55" r="${r}" fill="none" style="stroke:${posColor}" stroke-width="13" stroke-linecap="butt" stroke-dasharray="${posLen.toFixed(1)} ${c.toFixed(1)}" transform="rotate(-90 55 55)"/>
    <text x="55" y="61" text-anchor="middle" font-size="21" font-weight="900" style="fill:${posColor}">${posPct}%</text>
  </svg>`;
}

function gaugeArc(pct,color,target=50){
  const r=38,cx=55,cy=55,sw=10;
  const startAngle=Math.PI,endAngle=2*Math.PI;
  const angle=startAngle+(endAngle-startAngle)*Math.min(pct/100,1);
  const tAngle=startAngle+(endAngle-startAngle)*(target/100);
  function pt(a,radius){return{x:cx+radius*Math.cos(a),y:cy+radius*Math.sin(a)};}
  const s=pt(startAngle,r),e=pt(angle,r);
  const t=pt(tAngle,r+sw/2+2);
  const largeArc=angle-startAngle>Math.PI?1:0;
  return`<svg width="110" height="80" viewBox="0 0 110 80">
    <path d="M ${pt(startAngle,r).x} ${pt(startAngle,r).y} A ${r} ${r} 0 1 1 ${pt(endAngle,r).x} ${pt(endAngle,r).y}" fill="none" stroke="#eee" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M ${s.x} ${s.y} A ${r} ${r} 0 ${largeArc} 1 ${e.x} ${e.y}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>
    <circle cx="${t.x}" cy="${t.y}" r="3" fill="#999"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="14" font-weight="700" fill="${color}">${pct}%</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="8" fill="#999">Target: ${target}%</text>
  </svg>`;
}

function pSummary(){
  const h=D.home_stats,a=D.away_stats,bip=D.ball_in_play;

  // ── SVG helpers ──────────────────────────────────────────
  // two-team split donut (hPct + aPct = 100)
  function donut(hPct,cap){
    const r=42,c=2*Math.PI*r,hLen=c*hPct/100;
    return`<svg viewBox="0 0 110 110" style="width:92px;height:92px;flex-shrink:0">
      <circle cx="55" cy="55" r="${r}" fill="none" style="stroke:var(--snm)" stroke-width="16"/>
      <circle cx="55" cy="55" r="${r}" fill="none" style="stroke:var(--ks)" stroke-width="16" stroke-linecap="round" stroke-dasharray="${hLen.toFixed(1)} ${c.toFixed(1)}" transform="rotate(-90 55 55)"/>
      <text x="55" y="51" text-anchor="middle" font-size="26" font-weight="900" style="fill:var(--ksd)">${hPct}%</text>
      <text x="55" y="68" text-anchor="middle" font-size="9" style="fill:var(--mu)">${cap}</text>
    </svg>`;
  }
  // half-circle gauge (0-100%)
  function semiGauge(pct,color){
    const r=40,c=Math.PI*r,len=c*Math.min(Math.max(pct,0),100)/100;
    return`<svg viewBox="0 0 100 58" style="width:140px;height:78px;display:block;margin:0 auto">
      <path d="M10 54 A40 40 0 0 1 90 54" fill="none" stroke="#eee" stroke-width="10" stroke-linecap="round"/>
      <path d="M10 54 A40 40 0 0 1 90 54" fill="none" style="stroke:${color}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${len.toFixed(1)} ${c.toFixed(1)}"/>
    </svg>`;

  function mmss2sec(s){const[m,sec]=s.split(':').map(Number);return m*60+sec;}

  // ── cards ────────────────────────────────────────────────
  const scoreCard=`<div class="sum-card wide">

  const possCard=`<div class="sum-card">
    <div class="sum-card-title">Possession</div>

      ${semiGauge(TOT.h.pos_p,'var(--ks)')}

  const defCard=`<div class="sum-card">
    <div class="sum-card-title">Defence</div>
    ${statRow('Tackles Made',h.tack_att-h.tack_miss,a.tack_att-a.tack_miss,'')}
    ${statRow('Tackle Success %',h.tack_pct,a.tack_pct,'%')}
    ${statRow('Tackles Missed',h.tack_miss,a.tack_miss,'')}
    ${statRow('Turnovers Won',h.to_won,a.to_won,'')}
    ${statRow('Penalties Conceded',h.penalties,a.penalties,'')}
  </div>`;

  const e22Card=`<div class="sum-card">
    <div class="sum-card-title">22m Entries</div>
    <div style="display:flex;justify-content:center;align-items:center;text-align:center;gap:24px;padding:4px 0">
      <div>
        <svg viewBox="0 0 110 110" style="width:72px;height:72px">
          <circle cx="55" cy="55" r="42" fill="none" stroke="#eee" stroke-width="12"/>
          <circle cx="55" cy="55" r="42" fill="none" style="stroke:var(--ks)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${(2*Math.PI*42*h.s22_pct/100).toFixed(1)} ${(2*Math.PI*42).toFixed(1)}" transform="rotate(-90 55 55)"/>
          <text x="55" y="52" text-anchor="middle" font-size="20" font-weight="900" style="fill:var(--ksd)">${h.s22_pct.toFixed(0)}%</text>
          <text x="55" y="68" text-anchor="middle" font-size="8" style="fill:var(--mu)">conv</text>
        </svg>
        <div style="font-size:9px;font-weight:800;color:var(--ksd);margin-top:2px">${HOME}</div>
        <div style="font-size:8px;color:var(--mu)">${h.s22}/${h.e22} entries → try</div>
      </div>
      <div>
        <svg viewBox="0 0 110 110" style="width:72px;height:72px">
          <circle cx="55" cy="55" r="42" fill="none" stroke="#eee" stroke-width="12"/>
          <circle cx="55" cy="55" r="42" fill="none" style="stroke:var(--snm)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${(2*Math.PI*42*a.s22_pct/100).toFixed(1)} ${(2*Math.PI*42).toFixed(1)}" transform="rotate(-90 55 55)"/>
          <text x="55" y="52" text-anchor="middle" font-size="20" font-weight="900" style="fill:var(--snm)">${a.s22_pct.toFixed(0)}%</text>
          <text x="55" y="68" text-anchor="middle" font-size="8" style="fill:var(--mu)">conv</text>
        </svg>
        <div style="font-size:9px;font-weight:800;color:var(--snm);margin-top:2px">${AWAY}</div>
        <div style="font-size:8px;color:var(--mu)">${a.s22}/${a.e22} entries → try</div>

  return`<div class="page">${hdr('Match Summary')}<div class="sum-grid">
    ${scoreCard}${bipCard}${possCard}${terrCard}${e22Card}${attackCard}${kickCard}${defCard}${setPieceCard}

  const QBG=['#E69E4D','#E69233','#E87722','#A5461D'];

  // ── Match Totals card (two-column stat list, same look as Match Summary) ──

    if(key==='pos_t')return barRow(lbl,TOT.h.pos_t,TOT.a.pos_t,TOT.h.pos_p);
    return statRow(lbl,TOT.h[key],TOT.a[key],pct?'%':'');
  }
  const half=Math.ceil(ST.length/2);
  const totalCard=`<div class="sum-card wide">
    <div class="sum-card-title">Match Totals</div>
    <div class="qtot-cols">
      <div>${ST.slice(0,half).map(totalRow).join('')}</div>
      <div>${ST.slice(half).map(totalRow).join('')}</div>
    </div>
  </div>`;

  // ── Per-quarter card function ──
  function qCardFn(q,i){
    const rows=ST.map(([lbl,key,pct,sep,good])=>{
      const hv=f(QD.h[q][key],pct),av=f(QD.a[q][key],pct);
      const c=key==='pos_t'?cls(QD.h[q].pos_p,QD.a[q].pos_p,good):cls(hv,av,good);
      return`<div class="qtr-row"><span class="ql-v h ${c.h}">${hv}</span><span class="ql-lbl">${lbl}</span><span class="ql-v a ${c.a}">${av}</span></div>`;
    }).join('');
    return`<div class="qtr-card">
      <div class="qtr-head" style="background:${QBG[i]}"><span class="qh-name">${q}</span><span class="qh-range">${QL[i]}</span></div>
      <div class="qtr-body">
        <div style="display:flex;justify-content:space-between;padding:2px 0 4px;border-bottom:2px solid var(--ru)"><span style="font-size:10px;font-weight:800;color:var(--ksd)">KUB</span><span style="font-size:10px;font-weight:800;color:var(--snm)">YCE</span></div>
        ${rows}
      </div>
    </div>`;
  }

  const teamBand=`<div class="qtr-teamband"><div class="qtb h">${HOME}</div><div class="qtb a">${AWAY}</div></div>`;

  // Match Totals を中央カード形式に変更
  const totalCenter=`<div class="qtr-card" style="border:2px solid var(--ks)">
    <div class="qtr-head" style="background:linear-gradient(135deg,var(--ks),var(--ksd));justify-content:center">
      <span class="qh-name" style="font-size:13px;letter-spacing:.08em">MATCH TOTAL</span>
    </div>
    <div class="qtr-body" style="padding:4px 8px">
        <div style="display:flex;justify-content:space-between;padding:2px 0 4px;border-bottom:2px solid var(--ru)"><span style="font-size:11px;font-weight:800;color:var(--ksd)">KUB</span><span style="font-size:11px;font-weight:800;color:var(--snm)">YCE</span></div>
      ${ST.map(([lbl,key,pct,sep,good])=>{
        const hv=f(TOT.h[key],pct),av=f(TOT.a[key],pct);
        const c=key==='pos_t'?cls(TOT.h.pos_p,TOT.a.pos_p,good):cls(hv,av,good);
        return'<div class="qtr-row"><span class="ql-v h '+c.h+'" style="font-size:12px;font-weight:800">'+hv+'</span><span class="ql-lbl" style="font-size:9px;font-weight:700">'+lbl+'</span><span class="ql-v a '+c.a+'" style="font-size:12px;font-weight:800">'+av+'</span></div>';
      }).join('')}
    </div>
  </div>`;

  // Q1 Q2 の配列
  const qLeft=QS.slice(0,2).map((q,i)=>qCardFn(q,i)).join('');
  const qRight=QS.slice(2).map((q,i)=>qCardFn(q,i+2)).join('');

  return`<div class="page">${hdr('Summary – Quarters')}
    <div class="qtr-grid">${qLeft}${totalCenter}${qRight}</div>
    <div class="qtr-foot">
      <span>Try=5 · Conv=2 · PG/DG=3</span>
      <span style="color:var(--gd)">■ Better</span><span style="color:var(--wn)">■ Worse</span>
    </div>

}

function pMomentum(){
  const MAX=85;
  function tl(ev,label){
    const bm={};ev.forEach(e=>{if(!bm[e.m])bm[e.m]={h:0,a:0};if(e.t===H)bm[e.m].h++;else bm[e.m].a++;});
    const dots=Object.entries(bm).map(([m,c])=>{
      const l=Math.min(+m/MAX*100,99);
      let d='';
      if(c.h)d+=`<div class="tldot h" style="left:${l}%"></div><div class="tlml h" style="left:${l}%">${m}'${c.h>1?'×'+c.h:''}</div>`;
      if(c.a)d+=`<div class="tldot a" style="left:${l}%"></div><div class="tlml a" style="left:${l}%">${m}'${c.a>1?'×'+c.a:''}</div>`;
      return d;
    }).join('');
    const ht=40/MAX*100;
    return`<div><div class="tlt">${label}</div>
      <div class="tlleg"><span><span class="dot" style="background:var(--ks)"></span>${H}</span><span><span class="dot" style="background:var(--sn);border:1px solid #888"></span>${A}</span></div>
      <div class="tlch"><div class="tlax"></div><div class="htl" style="left:${ht}%"><span class="htlb">HT</span></div>${dots}</div>
      <div class="tlla">${[0,10,20,30,40,50,60,70,80].map(m=>`<span>${m}'</span>`).join('')}</div>
    </div>`;
  }

  // 累積折れ線
  const all=[];
  SEV.forEach(e=>all.push({t:e.t,m:e.m,v:1}));
  KEV.forEach(e=>all.push({t:e.t,m:e.m,v:0.5}));
  MEV.forEach(e=>all.push({t:e.t,m:e.m,v:-0.5}));
  PEV.forEach(e=>all.push({t:e.t,m:e.m,v:-0.5}));
  all.sort((a,b)=>a.m-b.m);

  let hs=0,as2=0;
  const hP=[{m:0,v:0}],aP=[{m:0,v:0}];
  all.forEach(e=>{
    if(e.t===H){hs=Math.round((hs+e.v)*10)/10;hP.push({m:e.m,v:hs});}
    else{as2=Math.round((as2+e.v)*10)/10;aP.push({m:e.m,v:as2});}
  });
  hP.push({m:MAX,v:hs}); aP.push({m:MAX,v:as2});

  const allV=[...hP,...aP].map(p=>p.v);
  const minV=Math.min(...allV)-0.3, maxV=Math.max(...allV)+0.3, rng=maxV-minV;

  // SVG: viewBox幅を固定してタイムラインと同じ幅感に
  const VW=900,VH=150,PL=28,PR=10,PT=18,PB=24;
  const GW=VW-PL-PR, GH=VH-PT-PB;
  const tx=m=>PL+m/MAX*GW;
  const ty=v=>PT+(maxV-v)/rng*GH;

  // グリッド
  const gVals=[];
  for(let v=Math.ceil(minV);v<=Math.floor(maxV)+1;v++) gVals.push(v);
  const grid=gVals.map(v=>{
    const y=ty(v);
    if(y<PT||y>VH-PB)return'';
    return`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${VW-PR}" y2="${y.toFixed(1)}" stroke="${v===0?'#aaa':'#ebebeb'}" stroke-width="${v===0?0.8:0.4}"/>
    <text x="${PL-2}" y="${(y+1.8).toFixed(1)}" font-size="7" fill="${v===0?'#888':'#ccc'}" text-anchor="end">${v}</text>`;
  }).join('');

  // Q区切り線（HTと重なる40分線は除外）
  const QBC=['#E87722','#2E7D32','#7B1FA2','#C62828'];
  const qlines=[[20,'Q2',QBC[1]],[60,'Q4',QBC[3]]].map(([m,lbl,col])=>{
    const x=tx(m);
    return`<line x1="${x.toFixed(1)}" y1="${PT}" x2="${x.toFixed(1)}" y2="${(VH-PB).toFixed(1)}" stroke="${col}" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="${(x+2).toFixed(1)}" y="${(PT+6).toFixed(1)}" font-size="8" fill="${col}" opacity="0.8">${lbl}</text>`;
  }).join('');

  // HT線
  const htl=`<line x1="${tx(40).toFixed(1)}" y1="${PT}" x2="${tx(40).toFixed(1)}" y2="${(VH-PB).toFixed(1)}" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="${tx(40).toFixed(1)}" y="${(PT-2).toFixed(1)}" font-size="7" fill="#aaa" text-anchor="middle">HT</text>`;

  // エリア
  function area(pts,col){
    const zy=ty(0);
    const top=pts.map((p,i)=>`${i===0?'M':'L'}${tx(p.m).toFixed(1)},${ty(p.v).toFixed(1)}`).join(' ');
    return`<path d="${top} L${tx(pts[pts.length-1].m).toFixed(1)},${zy.toFixed(1)} L${tx(pts[0].m).toFixed(1)},${zy.toFixed(1)} Z" fill="${col}" opacity="0.1"/>`;
  }
  function line(pts,col,dash=false){
    const d=pts.map((p,i)=>`${i===0?'M':'L'}${tx(p.m).toFixed(1)},${ty(p.v).toFixed(1)}`).join(' ');
    return`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" ${dash?'stroke-dasharray="4,2.5"':''}/>`;
  }
  function ndots(pts,col){
    return pts.filter((_,i)=>i>0&&i<pts.length-1).map(p=>`<circle cx="${tx(p.m).toFixed(1)}" cy="${ty(p.v).toFixed(1)}" r="2.6" fill="${col}" stroke="white" stroke-width="0.6"/>`).join('');
  }

  // X軸ラベル
  const xl=[0,10,20,30,40,50,60,70,80].map(m=>`<text x="${tx(m).toFixed(1)}" y="${(VH-PB+8).toFixed(1)}" font-size="7.5" fill="#999" text-anchor="middle">${m}'</text>`).join('');

  // 最終値
  const hEnd=hP[hP.length-1], aEnd=aP[aP.length-1];
  const hEy=Math.max(Math.min(ty(hEnd.v),VH-PB-2),PT+2);
  const aEy=Math.max(Math.min(ty(aEnd.v),VH-PB-8),PT+2);

  const svg=`<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;height:220px;display:block">
    <rect x="${PL}" y="${PT}" width="${GW}" height="${GH}" fill="#fafaf8" rx="2"/>
    ${grid}${qlines}${htl}
    ${area(hP,'#E87722')}${area(aP,'#1A3460')}
    ${line(hP,'#E87722')}${line(aP,'#1A3460',true)}
    ${ndots(hP,'#E87722')}${ndots(aP,'#1A3460')}

function pE22(){

function pSetPiece(){

  function jr2(t){return D.setpiece[t].lo_jumpers.map(r=>`<tr><td style="text-align:left">${r.player}</td><td>${r.total}</td><td style="color:var(--gd)">${r.won}</td><td style="color:var(--wn)">${r.total-r.won}</td><td><strong>${r.pct}%</strong></td></tr>`).join('');}

  function grid4(items){
    return`<div class="sp2-grid4">${items.map(([l,v,c])=>`<div class="c"><div class="n" style="color:${c||'var(--ink)'}">${v!==null&&v!==undefined&&v!==''?v:'-'}</div><div class="l">${l}</div></div>`).join('')}</div>`;

        <div class="sp2-subtitle">Throwers</div>

    const negPct=denom?+(100-posPct).toFixed(1):0;
    return`<div class="sp2-card sc">
      <div class="sp2-head ${s}"><span>${t}</span><span>Scrum</span></div>
      <div class="sp2-body">
        <div class="sp2-subtitle">Scrum Won</div>
        <div class="sp2-stab-row">
          ${donutDuo(posPct,'var(--gd)','var(--wn)')}
          <div class="sp2-stab-stats">
            <div class="r"><span class="l">Positive %</span><span class="v" style="color:var(--gd)">${posPct}%</span></div>
            <div class="r"><span class="l">Negative %</span><span class="v" style="color:var(--wn)">${negPct}%</span></div>
          </div>
        </div>
        ${grid4([['Positive',sc.positive,'var(--gd)'],['Neutral',sc.neutral,''],['Negative',sc.negative,sc.negative?'var(--wn)':''],['Pen Try',sc.pen_try,sc.pen_try?'var(--wn)':'']])}
      </div>

  // ── Center overview cards ──
  const loOverview=`<div class="sp2-card">
    <div class="sp2-head mid">Lineout Overview</div>
    <div class="sp2-body">
      <div class="sp2-mid-donuts">
        <div class="d h">${gaugeHalf(h.lo_pct,'var(--ks)')}<div class="lbl">KUB Won %</div></div>
        <div class="d a">${gaugeHalf(a.lo_pct,'var(--snm)')}<div class="lbl">YCE Won %</div></div>
      </div>
      <table class="spmt"><thead><tr><th style="text-align:left">Team</th><th>Total</th><th>Won</th><th>Lost</th><th>Win %</th><th>Steal</th></tr></thead><tbody>
        <tr><td class="tn" style="color:var(--ksd)">KUB</td><td>${h.lineouts}</td><td style="color:var(--gd)">${h.lo_won}</td><td style="color:var(--wn)">${h.lineouts-h.lo_won}</td><td><strong>${h.lo_pct}%</strong></td><td>${h.lo_steal}</td></tr>
        <tr><td class="tn" style="color:var(--snm)">YCE</td><td>${a.lineouts}</td><td style="color:var(--gd)">${a.lo_won}</td><td style="color:var(--wn)">${a.lineouts-a.lo_won}</td><td><strong>${a.lo_pct}%</strong></td><td>${a.lo_steal}</td></tr>
      </tbody></table>
    </div>
  </div>`;

  const hSc=D.setpiece[HOME].scrum, aSc=D.setpiece[AWAY].scrum;
  const hScDenom=hSc.total-hSc.reset, aScDenom=aSc.total-aSc.reset; const hScWinPct=hScDenom?+(hSc.won/hScDenom*100).toFixed(1):0, aScWinPct=aScDenom?+(aSc.won/aScDenom*100).toFixed(1):0;
  const scOverview=`<div class="sp2-card">
    <div class="sp2-head mid">Scrum Overview</div>
    <div class="sp2-body">
      <div class="sp2-mid-donuts">
        <div class="d h">${gaugeHalf(hScWinPct,'var(--ks)')}<div class="lbl">KUB Won %</div></div>
        <div class="d a">${gaugeHalf(aScWinPct,'var(--snm)')}<div class="lbl">YCE Won %</div></div>
      </div>
      <table class="spmt"><thead><tr><th style="text-align:left">Team</th><th>Total</th><th>Won</th><th>Pen Won</th><th>Reset</th><th>Win %</th></tr></thead><tbody>
        <tr><td class="tn" style="color:var(--ksd)">KUB</td><td>${hSc.total}</td><td style="color:var(--gd)">${hSc.won}</td><td style="color:var(--gd)">${hSc.pen_won}</td><td style="color:var(--wn)">${hSc.reset}</td><td><strong>${hScWinPct}%</strong></td></tr>
        <tr><td class="tn" style="color:var(--snm)">YCE</td><td>${aSc.total}</td><td style="color:var(--gd)">${aSc.won}</td><td style="color:var(--gd)">${aSc.pen_won}</td><td style="color:var(--wn)">${aSc.reset}</td><td><strong>${aScWinPct}%</strong></td></tr>
      </tbody></table>
    </div>
  </div>`;

  const hMl=D.setpiece[HOME].maul, aMl=D.setpiece[AWAY].maul;
  return`<div class="page">${hdr('Set Piece')}<div class="sp2-wrap">
    <div class="sp2-col">${tryCard(hMl.seq_tries,'h','Lineout')}${loCard(HOME,'h')}</div>
    <div class="sp2-mid">${loOverview}</div>
    <div class="sp2-col">${tryCard(aMl.seq_tries,'a','Lineout')}${loCard(AWAY,'a')}</div>
    <div class="sp2-col">${tryCard(hSc.seq_tries,'h','Scrum')}${scCard(HOME,'h')}</div>
    <div class="sp2-mid">${scOverview}</div>
    <div class="sp2-col">${tryCard(aSc.seq_tries,'a','Scrum')}${scCard(AWAY,'a')}</div>
  </div></div>`;
}

function pPenalties(){
  function pc(team,side){
    const pd=PD[team];
    const total=pd.attack_count+pd.defence_count;
    const atkPct=Math.round(pd.attack_count/total*100);
    const defPct=100-atkPct;

    // Type bars
    const types=Object.entries(pd.by_type).sort((a,b)=>b[1]-a[1]);
    const mx=types[0]?.[1]||1;
    const typeBars=types.map(([t,n])=>`<div class="pbr"><span class="pbl">${t}</span><div class="pbt"><div class="pbf ${side}" style="width:${Math.round(n/mx*100)}%"></div></div><span class="pbn">${n}</span></div>`).join('');

    // Quarter bar chart
    const halves=Object.entries(pd.by_half).sort((a,b)=>a[0].localeCompare(b[0]));
    const qMax=Math.max(...halves.map(([,n])=>n),1);
    const qBars=`<div class="pen-bars">${halves.map(([q,n])=>{
      const bh=Math.round(n/qMax*100);
      return`<div class="pen-bar-col">
        <div class="pen-bar-val">${n}</div>
        <div class="pen-bar-track"><div class="pen-bar ${side}" style="height:${bh}%"></div></div>
        <div class="pen-bar-lbl">${q}</div>
      </div>`;
    }).join('')}</div>`;

    // Pos group bars
    const posOrder=['Front Row','Lock','Loosie','Inside','Midfield','Back 3'];
    const posBars=posOrder.filter(g=>pd.by_pos_group[g]).map(g=>{
      const n=pd.by_pos_group[g];
      return`<div class="pbr"><span class="pbl">${g}</span><div class="pbt"><div class="pbf ${side}" style="width:${Math.round(n/mx*100)}%"></div></div><span class="pbn">${n}</span></div>`;
    }).join('');

    // Attack/Defence stacked bar
    const adBar=`<div style="margin-bottom:3px">
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:4px">
        <span style="color:var(--ks)">Attack ${pd.attack_count}</span>
        <span style="color:var(--snm)">Defence ${pd.defence_count}</span>
      </div>
      <div class="adbar">
        <div class="adbar-atk" style="width:${atkPct}%">${atkPct}%</div>
        <div class="adbar-def" style="width:${defPct}%">${defPct}%</div>
      </div>
      <div style="font-size:10px;color:var(--mu)">Orange = Penalty conceded while attacking · Navy = while defending</div>
    </div>`;

    return`<div class="pent">
      <div class="penth ${side}">${team}<span>Total: ${total}</span></div>
      <div class="penb">
        <div class="pensc"><div class="penstitle">Attack vs Defence</div>${adBar}</div>
        <div class="pensc"><div class="penstitle">Penalty Type</div>${typeBars}</div>
        <div class="pensc"><div class="penstitle">By Quarter</div>${qBars}</div>
        <div class="pensc"><div class="penstitle">By Position Group</div>${posBars}</div>
      </div>
    </div>`;
  }
  return`<div class="page">${hdr('Penalties Conceded')}<div class="penwrap">${pc(H,'h')}${pc(A,'a')}</div></div>`;
}

    dom:a.dom+r.dom,try_saver:a.try_saver+r.try_saver,to_t:a.to_t+r.to_t,oa:a.oa+r.oa,pas:a.pas+r.pas,
    jck:a.jck+r.jck,tow:a.tow+r.tow,infr:a.infr+r.infr
  }),{att:0,tkl_assist:0,made:0,miss:0,dom:0,try_saver:0,to_t:0,oa:0,pas:0,jck:0,tow:0,infr:0});

  const body=rows.map(r=>{
    const pv  = r.pct!==null     ? r.pct+'%'      : '-';
    const pc2 = r.pct!==null     ? (r.pct>=90?'cg':r.pct<75?'cw':'') : '';
    const dv  = r.dom_pct!==null ? r.dom_pct+'%'  : '-';
    const hv  = r.hl!==null      ? r.hl+'%'       : '-';
    return`<tr>
      <td class="shc">${r.shirt}</td>
      <td class="nc">${r.player}</td>
      <td>${r.mins}'</td>
      <td>${r.att||''}</td>
      <td class="${r.tkl_assist?'cg':'cd'}">${r.tkl_assist||'-'}</td>
      <td>${r.made||''}</td>
      <td class="${r.miss?'cw':'cd'}">${r.miss||'-'}</td>
      <td class="${pc2}">${pv}</td>
      <td>${hv}</td>
      <td class="${r.dom?'cg':'cd'}">${r.dom||'-'}</td>
      <td>${dv}</td>
      <td class="${r.try_saver?'cg':'cd'}">${r.try_saver||'-'}</td>
      <td class="${r.to_t?'cg':'cd'}">${r.to_t||'-'}</td>
      <td class="${r.oa?'cw':'cd'}">${r.oa||'-'}</td>
      <td class="${r.pas?'cw':'cd'}">${r.pas||'-'}</td>
      <td class="${r.jck?'cg':'cd'}">${r.jck||'-'}</td>
      <td class="${r.tow?'cg':'cd'}">${r.tow||'-'}</td>
      <td class="${r.infr?'cw':'cd'}">${r.infr||'-'}</td>
    </tr>`;
  }).join('');

  const tPct    = tot.att ? (tot.made/tot.att*100).toFixed(1)+'%' : '-';
  const tDomPct = tot.att ? (tot.dom/tot.att*100).toFixed(1)+'%'  : '-';

  const totRow=`<tr class="tr${!isHome?' aw':''}">
    <td></td><td class="nc">TOTAL</td><td></td>
    <td>${tot.att}</td><td>${tot.tkl_assist}</td><td>${tot.made}</td><td>${tot.miss}</td><td>${tPct}</td>
    <td>-</td>
    <td>${tot.dom}</td><td>${tDomPct}</td>
    <td>${tot.try_saver}</td>
    <td>${tot.to_t}</td><td>${tot.oa}</td><td>${tot.pas}</td>
    <td>${tot.jck}</td><td>${tot.tow}</td><td>${tot.infr}</td>
  </tr>`;

  return`<div class="page">${hdr('Individual Defence – '+team)}
    <div class="itwrap">
      <table class="it">
        <thead>
          <tr class="gr">
            <th colspan="3" class="gl">PLAYER</th>
            <th colspan="6" class="${g}">TACKLE</th>
            <th colspan="6" class="${g}">TACKLE QUALITY</th>
            <th colspan="2" class="${g}">TURNOVER</th>
            <th class="${g}">INFRINGEMENT</th>
          </tr>
          <tr>
            <th>#</th><th>Name</th><th>Mins<br>Played</th>
            <th>Tackle<br>Attempts</th><th>Tackle<br>Assist</th><th>Tackle<br>Made</th><th>Tackle<br>Miss</th><th>Tackle<br>%</th><th>Height<br>Leg %</th>
            <th>Dominant<br>Tackle</th><th>Dominant<br>%</th>
            <th>Try Saver<br>Tackle</th><th>Turnover Won<br>Tackle</th>
            <th>Offload<br>Allowed</th><th>Passive<br>Tackle</th>
            <th>Jackal<br>Success</th><th>Turnovers<br>Won</th>
            <th>Infringement<br>(Pen + FK)</th>
          </tr>
        </thead>
        <tbody>${body}${totRow}</tbody>
      </table>
      <div class="note">
        <span>Tackle Assist = qualifier3Name 'Assist' · Dominant Tackle = qualifier4Name 'Dominant Tackle' · Dom% = Dom / Attempts</span>
        <span>Height Leg% = leg tackles / total tackles with height data (qualifier6Name)</span>
        <span>Turnover Won Tackle = Tackle/Turnover Won + Tackle/Forced in Touch · Infringement = Penalties + Free Kicks</span>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   NAV / INIT
   ============================================================ */
const pages=[
  {id:'ts',label:'Team Sheet'},
  {id:'summary',label:'Match Summary'},
  {id:'quarters',label:'Quarters'},
  {id:'momentum',label:'Momentum'},
  {id:'e22',label:'22m Entries'},
  {id:'setpiece',label:'Set Piece'},
  {id:'penalties',label:'Penalties'},
  {id:'atk_h',label:'Attack KUB'},
  {id:'atk_a',label:'Attack YCE'},
  {id:'def_h',label:'Defence KUB'},
  {id:'def_a',label:'Defence YCE'}
];
const builders={
  ts:pTeamSheet, summary:pSummary, quarters:pQuarters, momentum:pMomentum,
  e22:pE22, setpiece:pSetPiece, penalties:pPenalties,
  atk_h:()=>atkPage(HOME,'h'), atk_a:()=>atkPage(AWAY,'a'),
  def_h:()=>defPage(HOME,'h'), def_a:()=>defPage(AWAY,'a')
};
const nav=document.getElementById('nav'),content=document.getElementById('content');
pages.forEach((pg,i)=>{
  const btn=document.createElement('button');
  btn.textContent=pg.label;
  btn.onclick=()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');content.innerHTML=builders[pg.id]();};
  if(i===0)btn.classList.add('active');
  nav.appendChild(btn);
});
content.innerHTML=builders['ts']();
</script>
</body></html>
