function ovSetLeague(lg){
  var ts=document.getElementById('ovTeam'),ms=document.getElementById('ovMatch');
  ts.innerHTML='<option value="">チームを選んでください...</option>';
  ms.innerHTML='<option value="">試合を選んでください...</option>';
  ms.style.display='none';
  if(!lg){ts.style.display='none';return;}
  Object.keys(OV_DATA[lg]).sort().forEach(function(t){
    var o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);
  });
  ts.style.display='block';
}
function ovSetTeam(team){
  var lg=document.getElementById('ovLeague').value;
  var ms=document.getElementById('ovMatch');
  ms.innerHTML='<option value="">試合を選んでください...</option>';
  if(!team||!lg){ms.style.display='none';return;}
  OV_DATA[lg][team].forEach(function(m){
    var o=document.createElement('option');o.value=m.f;o.textContent=m.l;ms.appendChild(o);
  });
  ms.style.display='block';
}
